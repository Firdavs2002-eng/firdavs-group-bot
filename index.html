<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Firdavs Group Super App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=YOUR_API_KEY" type="text/javascript"></script>
    <style>
        :root { --main: #9c27b0; --bg: #f4f6f9; }
        body { background-color: var(--bg); font-family: -apple-system, sans-serif; }
        .wb-btn { background-color: var(--main); color: white; border-radius: 12px; font-weight: 600; transition: 0.2s; }
        .wb-btn:active { transform: scale(0.98); opacity: 0.9; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #eee; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        #map { width: 100%; height: 300px; border-radius: 12px; margin-top: 10px; }
        .select-item { border: 2px solid #eee; border-radius: 12px; padding: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .select-item.active { border-color: var(--main); background-color: #f3e5f5; }
        .radio-circle { width: 18px; height: 18px; border: 2px solid #ddd; border-radius: 50%; }
        .select-item.active .radio-circle { border-color: var(--main); background-color: var(--main); box-shadow: inset 0 0 0 3px white; }
    </style>
</head>
<body class="pb-24">

    <div id="home" class="page active p-4">
        <h1 class="text-xl font-bold mb-4 text-purple-800">FIRDAVS GROUP</h1>
        <div class="grid grid-cols-2 gap-3" id="product-list">
            <div class="bg-white p-3 rounded-xl border" onclick="openCheckout('Premium Krossovka', 450000)">
                <div class="h-32 bg-gray-100 rounded-lg mb-2 flex items-center justify-center text-3xl">👟</div>
                <h3 class="text-xs font-bold truncate">Premium Krossovka</h3>
                <p class="text-purple-600 font-bold text-sm">450,000 UZS</p>
                <button class="w-full wb-btn text-[10px] py-2 mt-2">Sotib olish</button>
            </div>
        </div>
    </div>

    <div id="checkout" class="page p-4">
        <div class="flex items-center mb-4">
            <button onclick="switchPage('home')" class="text-gray-400 mr-4 text-xl">⬅️</button>
            <h2 class="font-bold text-lg">Buyurtmani rasmiylashtirish</h2>
        </div>

        <div class="card">
            <h3 class="font-bold text-sm mb-3">Yetkazib berish turi</h3>
            <div class="select-item active" onclick="selectType(this, 'delivery')">
                <span class="text-sm font-medium">Do'kon yetkazib berish xizmati</span>
                <div class="radio-circle"></div>
            </div>
            <div class="select-item" onclick="selectType(this, 'pickup')">
                <span class="text-sm font-medium">Do'kon filialidan olib ketish</span>
                <div class="radio-circle"></div>
            </div>
        </div>

        <div class="card" id="mapSection">
            <h3 class="font-bold text-sm">Yetkazib berish manzili</h3>
            <p class="text-[11px] text-gray-500 mt-1" id="addressText">Xaritadan tanlang...</p>
            <div id="map"></div>
            <button class="w-full bg-purple-50 text-purple-600 font-bold text-xs py-3 mt-3 rounded-xl border border-purple-100" onclick="tg.showAlert('Manzil tasdiqlandi')">Manzilni o'zgartirish</button>
        </div>

        <div class="card">
            <h3 class="font-bold text-sm mb-3">To'lov usuli</h3>
            <div class="grid grid-cols-2 gap-2">
                <div class="select-item active" onclick="selectType(this)">
                    <span class="text-[11px] font-bold">💵 Naqd pul</span>
                    <div class="radio-circle"></div>
                </div>
                <div class="select-item" onclick="selectType(this)">
                    <span class="text-[11px] font-bold text-blue-600">click</span>
                    <div class="radio-circle"></div>
                </div>
                <div class="select-item" onclick="selectType(this)">
                    <span class="text-[11px] font-bold text-blue-400">Payme</span>
                    <div class="radio-circle"></div>
                </div>
                <div class="select-item" onclick="selectType(this)">
                    <span class="text-[11px] font-bold text-purple-700">uzum</span>
                    <div class="radio-circle"></div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-100 bg-white p-4 flex items-center justify-between border-t z-50 w-full">
            <div>
                <p class="text-xs text-gray-400">To'lov miqdori:</p>
                <p class="text-lg font-black text-purple-900" id="totalPrice">450,000 UZS</p>
            </div>
            <button class="wb-btn px-8 py-3" onclick="tg.showAlert('Buyurtma qabul qilindi!')">Buyurtmani tasdiqlash</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'checkout') initMap();
        }

        function openCheckout(name, price) {
            document.getElementById('totalPrice').innerText = price.toLocaleString() + " UZS";
            switchPage('checkout');
        }

        function selectType(el, type) {
            const parent = el.parentElement;
            parent.querySelectorAll('.select-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(type === 'pickup') document.getElementById('mapSection').style.opacity = '0.5';
            else document.getElementById('mapSection').style.opacity = '1';
        }

        // XARITA LOGIKASI
        let myMap;
        function initMap() {
            if(myMap) return;
            ymaps.ready(() => {
                myMap = new ymaps.Map("map", {
                    center: [41.2995, 69.2401], // Toshkent markazi
                    zoom: 12,
                    controls: ['zoomControl', 'fullscreenControl']
                });

                // Xarita bosilganda nuqta qo'yish
                myMap.events.add('click', function (e) {
                    let coords = e.get('coords');
                    myMap.geoObjects.removeAll();
                    let placemark = new ymaps.Placemark(coords, {
                        balloonContent: 'Yetkazish manzili'
                    }, { preset: 'islands#violetDotIcon' });
                    myMap.geoObjects.add(placemark);

                    // Manzilni matn ko'rinishida olish (Reverse Geocoding)
                    ymaps.geocode(coords).then(function (res) {
                        let firstGeoObject = res.geoObjects.get(0);
                        document.getElementById('addressText').innerText = firstGeoObject.getAddressLine();
                    });
                });
            });
        }
    </script>
</body>
</html>
